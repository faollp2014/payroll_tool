<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payroll Comparison Tool — Waseda Academy</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0f1e3c;
    --navy2: #1a3260;
    --blue: #2057b8;
    --sky: #4a90e2;
    --accent: #f0c040;
    --green: #2d6a3f;
    --green-light: #d4edda;
    --red: #8b1a1a;
    --red-light: #fde8e8;
    --bg: #f4f7fc;
    --card: #ffffff;
    --border: #d0daea;
    --text: #1a2540;
    --muted: #6b7a99;
    --mono: 'DM Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--navy);
    padding: 20px 40px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 3px solid var(--accent);
  }
  .logo {
    width: 38px; height: 38px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 800; color: var(--navy);
    flex-shrink: 0;
  }
  header h1 {
    font-size: 18px; font-weight: 700; color: #fff; letter-spacing: 0.03em;
  }
  header span {
    font-size: 12px; color: #8fa3c8; font-family: var(--mono); font-weight: 300;
    margin-left: auto;
  }

  /* ── Main ── */
  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  .intro {
    text-align: center;
    margin-bottom: 48px;
  }
  .intro h2 {
    font-size: 28px; font-weight: 800; color: var(--navy);
    line-height: 1.2; margin-bottom: 10px;
  }
  .intro p {
    color: var(--muted); font-size: 14px; font-family: var(--mono);
  }

  /* ── Upload Zone ── */
  .upload-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 32px;
  }

  .upload-card {
    background: var(--card);
    border: 2px dashed var(--border);
    border-radius: 16px;
    padding: 32px 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s, background .2s, transform .15s;
    position: relative;
    overflow: hidden;
  }
  .upload-card:hover {
    border-color: var(--sky);
    background: #f0f6ff;
    transform: translateY(-2px);
  }
  .upload-card.loaded {
    border-color: var(--blue);
    border-style: solid;
    background: #eef4ff;
  }
  .upload-card input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .upload-label {
    font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 12px; display: block;
    font-family: var(--mono);
  }
  .upload-icon {
    font-size: 36px; margin-bottom: 12px; display: block;
  }
  .upload-title {
    font-size: 16px; font-weight: 700; color: var(--navy); margin-bottom: 6px;
  }
  .upload-hint {
    font-size: 12px; color: var(--muted); font-family: var(--mono);
  }
  .upload-filename {
    margin-top: 12px;
    font-size: 12px;
    font-family: var(--mono);
    color: var(--blue);
    font-weight: 500;
    background: #dce9ff;
    border-radius: 6px;
    padding: 4px 8px;
    display: inline-block;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ── Arrow ── */
  .arrow-divider {
    display: flex; align-items: center; justify-content: center;
    color: var(--border); font-size: 28px; font-weight: 300;
    user-select: none; grid-column: 1 / -1;
    display: none; /* hidden, arrows are implicit */
  }

  /* ── Run Button ── */
  .run-btn {
    display: block;
    width: 100%;
    padding: 18px;
    background: var(--navy);
    color: #fff;
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 700;
    letter-spacing: .04em;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: background .2s, transform .1s, box-shadow .2s;
    position: relative;
    overflow: hidden;
    margin-bottom: 12px;
  }
  .run-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform .3s ease;
    z-index: 0;
  }
  .run-btn:hover::after { transform: scaleX(1); }
  .run-btn:hover { color: var(--navy); }
  .run-btn span { position: relative; z-index: 1; }
  .run-btn:disabled { opacity: .45; cursor: not-allowed; }
  .run-btn:disabled::after { display: none; }
  .run-btn:active:not(:disabled) { transform: scale(.985); }

  /* ── Status ── */
  #status {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    min-height: 20px;
    margin-bottom: 24px;
  }
  #status.error { color: var(--red); }
  #status.success { color: var(--green); font-weight: 500; }

  /* ── Preview Table ── */
  #preview-section {
    display: none;
  }
  .preview-tabs {
    display: flex; gap: 0; margin-bottom: 0;
    border-bottom: 2px solid var(--navy);
  }
  .tab-btn {
    padding: 10px 22px;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    background: #e8edf7;
    border: none;
    cursor: pointer;
    color: var(--muted);
    border-radius: 8px 8px 0 0;
    margin-right: 4px;
    transition: background .15s, color .15s;
    letter-spacing: .02em;
  }
  .tab-btn.active {
    background: var(--navy);
    color: #fff;
  }
  .table-wrap {
    background: var(--card);
    border-radius: 0 12px 12px 12px;
    overflow: auto;
    box-shadow: 0 2px 12px rgba(15,30,60,.07);
    max-height: 420px;
    border: 1px solid var(--border);
    border-top: none;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12.5px;
    font-family: var(--mono);
    min-width: 620px;
  }
  thead th {
    background: var(--navy);
    color: #fff;
    padding: 10px 14px;
    text-align: left;
    font-weight: 600;
    font-size: 11px;
    letter-spacing: .06em;
    text-transform: uppercase;
    position: sticky; top: 0; z-index: 2;
    white-space: nowrap;
  }
  thead th.num { text-align: right; }
  tbody tr:nth-child(even) { background: #f8fafd; }
  tbody tr:hover { background: #eef4ff; }
  tbody td {
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  td.emp-row {
    background: #dce9ff !important;
    font-weight: 700;
    font-family: var(--sans);
    font-size: 13px;
    color: var(--navy);
    padding: 10px 14px;
  }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  td.pos { color: var(--green); font-weight: 600; }
  td.neg { color: var(--red); font-weight: 600; }
  td.zero { color: var(--muted); }

  /* ── Download ── */
  .download-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    background: var(--navy);
    border-radius: 12px;
    margin-top: 20px;
  }
  .download-bar span {
    font-size: 13px; color: #8fa3c8; font-family: var(--mono);
  }
  .dl-btn {
    padding: 10px 24px;
    background: var(--accent);
    color: var(--navy);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 800;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: .03em;
    transition: transform .1s, box-shadow .15s;
  }
  .dl-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(240,192,64,.4); }
  .dl-btn:active { transform: scale(.97); }

  /* ── Footer ── */
  footer {
    text-align: center;
    padding: 24px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }

  @media (max-width: 600px) {
    .upload-grid { grid-template-columns: 1fr; }
    header { padding: 14px 20px; }
    main { padding: 24px 16px 60px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">W</div>
  <h1>Payroll Comparison Tool</h1>
  <span>Waseda Academy UK Co., Ltd</span>
</header>

<main>
  <div class="intro">
    <h2>月次給与差異レポート</h2>
    <p>前月・今月の Payroll Activity Details ファイルをアップロードしてください</p>
  </div>

  <div class="upload-grid">
    <div class="upload-card" id="card-prev">
      <input type="file" id="file-prev" accept=".xlsx,.xls" onchange="handleFile('prev', this)">
      <span class="upload-label">前月 / Previous Month</span>
      <span class="upload-icon">📂</span>
      <div class="upload-title">前月データ</div>
      <div class="upload-hint">.xlsx ファイルを選択</div>
      <div class="upload-filename" id="name-prev" style="display:none"></div>
    </div>
    <div class="upload-card" id="card-curr">
      <input type="file" id="file-curr" accept=".xlsx,.xls" onchange="handleFile('curr', this)">
      <span class="upload-label">今月 / Current Month</span>
      <span class="upload-icon">📂</span>
      <div class="upload-title">今月データ</div>
      <div class="upload-hint">.xlsx ファイルを選択</div>
      <div class="upload-filename" id="name-curr" style="display:none"></div>
    </div>
  </div>

  <button class="run-btn" id="run-btn" onclick="runComparison()" disabled>
    <span>▶ 差異レポートを生成</span>
  </button>
  <div id="status"></div>

  <div id="preview-section">
    <div class="preview-tabs">
      <button class="tab-btn active" onclick="switchTab('summary')">Difference Summary</button>
      <button class="tab-btn" onclick="switchTab('detail')">Difference Detail</button>
    </div>
    <div class="table-wrap">
      <table id="preview-table"></table>
    </div>
    <div class="download-bar">
      <span id="dl-label">比較レポートの準備ができました</span>
      <button class="dl-btn" onclick="downloadExcel()">⬇ Excel をダウンロード</button>
    </div>
  </div>
</main>

<footer>Waseda Academy UK Co., Ltd — Internal Payroll Tool</footer>

<script>
const state = { prev: null, curr: null, summaryData: null, detailData: null, activeTab: 'summary' };

function handleFile(which, input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const wb = XLSX.read(e.target.result, { type: 'array', cellDates: true });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });
    state[which] = { rows, filename: file.name };
    document.getElementById('name-' + which).textContent = file.name;
    document.getElementById('name-' + which).style.display = 'inline-block';
    document.getElementById('card-' + which).classList.add('loaded');
    document.getElementById('card-' + which).querySelector('.upload-icon').textContent = '✅';
    checkReady();
  };
  reader.readAsArrayBuffer(file);
}

function checkReady() {
  document.getElementById('run-btn').disabled = !(state.prev && state.curr);
}

function parsePayroll(rows) {
  // Extract period string from row index 2
  let period = '';
  if (rows[2] && rows[2][0]) period = String(rows[2][0]);

  const records = [];
  for (const row of rows) {
    const emp = row[0] ? String(row[0]).trim() : '';
    const ptype = row[1] ? String(row[1]).trim() : '';
    const item = row[2] ? String(row[2]).trim() : '';
    const amount = row[6];

    if (!ptype || ptype.trim() === '' || ptype === 'Pay Item Type' || ptype === 'null' || ptype === 'nan') continue;
    if (!emp || emp.trim() === '' || emp.includes('Total')) continue;
    if (amount === null || amount === undefined || amount === '') continue;
    const num = parseFloat(amount);
    if (isNaN(num)) continue;
    records.push({ emp, ptype, item, amount: num });
  }
  return { period, records };
}

function groupBy(records, keys) {
  const map = new Map();
  for (const r of records) {
    const k = keys.map(kk => r[kk]).join('|||');
    map.set(k, (map.get(k) || 0) + r.amount);
  }
  return map;
}

function runComparison() {
  setStatus('処理中...', '');
  document.getElementById('run-btn').disabled = true;

  setTimeout(() => {
    try {
      const prev = parsePayroll(state.prev.rows);
      const curr = parsePayroll(state.curr.rows);

      // Determine labels from period strings
      const prevLabel = extractLabel(prev.period) || '前月';
      const currLabel = extractLabel(curr.period) || '今月';

      // Summary: emp + ptype
      const prevSumMap = groupBy(prev.records, ['emp', 'ptype']);
      const currSumMap = groupBy(curr.records, ['emp', 'ptype']);
      const summaryKeys = new Set([...prevSumMap.keys(), ...currSumMap.keys()]);

      const summaryRows = [];
      for (const k of summaryKeys) {
        const [emp, ptype] = k.split('|||');
        const pv = prevSumMap.get(k) || 0;
        const cv = currSumMap.get(k) || 0;
        summaryRows.push({ emp, ptype, prev: pv, curr: cv, diff: cv - pv });
      }
      summaryRows.sort((a, b) => a.emp.localeCompare(b.emp) || a.ptype.localeCompare(b.ptype));

      // Detail: emp + ptype + item
      const prevDetMap = groupBy(prev.records, ['emp', 'ptype', 'item']);
      const currDetMap = groupBy(curr.records, ['emp', 'ptype', 'item']);
      const detailKeys = new Set([...prevDetMap.keys(), ...currDetMap.keys()]);

      const detailRows = [];
      for (const k of detailKeys) {
        const [emp, ptype, item] = k.split('|||');
        const pv = prevDetMap.get(k) || 0;
        const cv = currDetMap.get(k) || 0;
        detailRows.push({ emp, ptype, item, prev: pv, curr: cv, diff: cv - pv });
      }
      detailRows.sort((a, b) => a.emp.localeCompare(b.emp) || a.ptype.localeCompare(b.ptype) || a.item.localeCompare(b.item));

      state.summaryData = { rows: summaryRows, prevLabel, currLabel, prevPeriod: prev.period, currPeriod: curr.period };
      state.detailData  = { rows: detailRows,  prevLabel, currLabel, prevPeriod: prev.period, currPeriod: curr.period };

      renderTable('summary');
      document.getElementById('preview-section').style.display = 'block';
      document.getElementById('dl-label').textContent = `${prevLabel} vs ${currLabel} — 比較完了`;
      setStatus(`✓ ${summaryRows.length} 件のサマリー、${detailRows.length} 件の詳細を生成しました`, 'success');
    } catch (err) {
      setStatus('エラー: ' + err.message, 'error');
    }
    document.getElementById('run-btn').disabled = false;
  }, 50);
}

function extractLabel(period) {
  // Try to extract e.g. "Feb 2026" from "For the period 1 February 2026 to 28 February 2026"
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const short   = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  for (let i = 0; i < months.length; i++) {
    const re = new RegExp(months[i] + '\\s+(\\d{4})');
    const m = period.match(re);
    if (m) return short[i] + ' ' + m[1];
  }
  return period.slice(0, 20);
}

function fmt(n) {
  return '£' + Math.abs(n).toLocaleString('en-GB', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function fmtDiff(n) {
  if (Math.abs(n) < 0.005) return '—';
  const s = (n >= 0 ? '+' : '-') + fmt(n);
  return s;
}

function renderTable(tab) {
  const data = tab === 'summary' ? state.summaryData : state.detailData;
  const { rows, prevLabel, currLabel } = data;
  const table = document.getElementById('preview-table');

  let html = '<thead><tr>';
  if (tab === 'summary') {
    html += `<th>Employee</th><th>Pay Item Type</th><th class="num">${prevLabel}</th><th class="num">${currLabel}</th><th class="num">Difference</th>`;
  } else {
    html += `<th>Employee</th><th>Pay Item Type</th><th>Pay Item</th><th class="num">${prevLabel}</th><th class="num">${currLabel}</th><th class="num">Difference</th>`;
  }
  html += '</tr></thead><tbody>';

  let lastEmp = null;
  for (const r of rows) {
    if (r.emp !== lastEmp) {
      const colspan = tab === 'summary' ? 5 : 6;
      html += `<tr><td class="emp-row" colspan="${colspan}">👤 ${r.emp}</td></tr>`;
      lastEmp = r.emp;
    }
    const diffClass = Math.abs(r.diff) < 0.005 ? 'zero' : (r.diff > 0 ? 'pos' : 'neg');
    if (tab === 'summary') {
      html += `<tr>
        <td></td>
        <td>${r.ptype}</td>
        <td class="num">${fmt(r.prev)}</td>
        <td class="num">${fmt(r.curr)}</td>
        <td class="num ${diffClass}">${fmtDiff(r.diff)}</td>
      </tr>`;
    } else {
      html += `<tr>
        <td></td>
        <td>${r.ptype}</td>
        <td>${r.item}</td>
        <td class="num">${fmt(r.prev)}</td>
        <td class="num">${fmt(r.curr)}</td>
        <td class="num ${diffClass}">${fmtDiff(r.diff)}</td>
      </tr>`;
    }
  }
  html += '</tbody>';
  table.innerHTML = html;
}

function switchTab(tab) {
  state.activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && tab === 'summary') || (i === 1 && tab === 'detail'));
  });
  renderTable(tab);
}

function setStatus(msg, cls) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = cls || '';
}

// ── Excel Download ──
function downloadExcel() {
  const { summaryData, detailData } = state;
  if (!summaryData) return;

  const wb = XLSX.utils.book_new();

  // Helper: build aoa for a sheet
  function buildSummaryAOA() {
    const { rows, prevLabel, currLabel, prevPeriod, currPeriod } = summaryData;
    const aoa = [
      ['Waseda Academy UK Co., Ltd \u2014 Payroll Comparison'],
      [prevPeriod + '  vs  ' + currPeriod],
      [],
      ['Employee', 'Pay Item Type', prevLabel, currLabel, 'Difference', 'Note']
    ];
    let lastEmp = null;
    for (const r of rows) {
      if (r.emp !== lastEmp) {
        if (lastEmp !== null) aoa.push(['', '', '', '', '', '']); // blank row between employees
        aoa.push([r.emp, '', '', '', '', '']); // employee header row
        lastEmp = r.emp;
      }
      aoa.push(['', r.ptype, round2(r.prev), round2(r.curr), round2(r.diff), '']);
    }
    return aoa;
  }

  function buildDetailAOA() {
    const { rows, prevLabel, currLabel, prevPeriod, currPeriod } = detailData;
    const aoa = [
      ['Waseda Academy UK Co., Ltd \u2014 Payroll Comparison (Detail)'],
      [prevPeriod + '  vs  ' + currPeriod],
      [],
      ['Employee', 'Pay Item Type', 'Pay Item', prevLabel, currLabel, 'Difference', 'Note']
    ];
    let lastEmp = null;
    for (const r of rows) {
      if (r.emp !== lastEmp) {
        if (lastEmp !== null) aoa.push(['', '', '', '', '', '', '']); // blank row between employees
        aoa.push([r.emp, '', '', '', '', '', '']); // employee header row
        lastEmp = r.emp;
      }
      aoa.push(['', r.ptype, r.item, round2(r.prev), round2(r.curr), round2(r.diff), '']);
    }
    return aoa;
  }

  function round2(n) { return Math.round(n * 100) / 100; }

  function styleSheet(ws, isSummary) {
    if (isSummary) {
      ws['!cols'] = [{wch:24},{wch:24},{wch:14},{wch:14},{wch:14},{wch:18}];
    } else {
      ws['!cols'] = [{wch:24},{wch:22},{wch:34},{wch:14},{wch:14},{wch:14},{wch:18}];
    }
  }

  const sumAOA = buildSummaryAOA();
  const detAOA = buildDetailAOA();

  const wsSum = XLSX.utils.aoa_to_sheet(sumAOA);
  styleSheet(wsSum, true);
  XLSX.utils.book_append_sheet(wb, wsSum, 'Difference Summary');

  const wsDet = XLSX.utils.aoa_to_sheet(detAOA);
  styleSheet(wsDet, false);
  XLSX.utils.book_append_sheet(wb, wsDet, 'Difference Detail');

  // Include original data sheets from uploaded files
  if (state.prev) {
    const pwb = XLSX.read(state.prev._raw, { type: 'array' });
    const pws = pwb.Sheets[pwb.SheetNames[0]];
    XLSX.utils.book_append_sheet(wb, pws, summaryData.prevLabel + ' - Payroll Details');
  }
  if (state.curr) {
    const cwb = XLSX.read(state.curr._raw, { type: 'array' });
    const cws = cwb.Sheets[cwb.SheetNames[0]];
    XLSX.utils.book_append_sheet(wb, cws, summaryData.currLabel + ' - Payroll Details');
  }

  const filename = `Payroll_Comparison_${summaryData.prevLabel}_${summaryData.currLabel}.xlsx`.replace(/\s/g,'_');
  XLSX.writeFile(wb, filename);
}

// Re-store raw ArrayBuffer for re-reading original sheets
const origHandleFile = handleFile;
function handleFile(which, input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const buf = e.target.result;
    const wb = XLSX.read(buf, { type: 'array', cellDates: true });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });
    state[which] = { rows, filename: file.name, _raw: buf };
    document.getElementById('name-' + which).textContent = file.name;
    document.getElementById('name-' + which).style.display = 'inline-block';
    document.getElementById('card-' + which).classList.add('loaded');
    document.getElementById('card-' + which).querySelector('.upload-icon').textContent = '✅';
    checkReady();
  };
  reader.readAsArrayBuffer(file);
}
</script>
</body>
</html>
